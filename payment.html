<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Smash Arena</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Syncopate:wght@700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="page-header" style="padding: 4rem 5% 2rem;">
        <h1>SECURE <span>CHECKOUT</span></h1>
        <p>Complete your payment to confirm the booking.</p>
    </header>

    <main class="payment-container">
        <div class="payment-card">
            <div class="order-summary" id="order-summary">
                <h3>Order Summary</h3>
                <p id="summary-date">Date: ...</p>
                <div id="summary-items"></div>
                <h3 style="margin-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">Total:
                    <span id="summary-total" style="float:right;">Rs. 0</span></h3>
            </div>

            <form id="payment-form">
                <div class="form-group">
                    <label>Name on Card</label>
                    <input type="text" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" required placeholder="0000 0000 0000 0000" maxlength="19">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Expiry (MM/YY)</label>
                        <input type="text" required placeholder="12/26" maxlength="5">
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="password" required placeholder="123" maxlength="3">
                    </div>
                </div>
                <button type="submit" class="btn-primary payment-btn glow">Pay Now</button>
            </form>
        </div>
    </main>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const pending = JSON.parse(sessionStorage.getItem('pendingBooking'));
            if (!pending) {
                window.location.href = 'booking.html';
                return;
            }

            document.getElementById('summary-date').textContent = `Date: ${pending.date}`;
            document.getElementById('summary-total').textContent = `Rs. ${pending.total}`;

            const itemsDiv = document.getElementById('summary-items');
            pending.items.forEach(item => {
                itemsDiv.innerHTML += `<p style="color: var(--text-muted); font-size: 0.9rem;">${item.court} - ${item.slot}</p>`;
            });

            document.getElementById('payment-form').addEventListener('submit', (e) => {
                e.preventDefault();

                // Process mock payment & save booking
                let bookings = getBookings();
                if (!bookings[pending.date]) bookings[pending.date] = {};

                pending.items.forEach(item => {
                    if (!bookings[pending.date][item.court]) {
                        bookings[pending.date][item.court] = [];
                    }
                    bookings[pending.date][item.court].push(item.slot);
                });

                saveBookings(bookings);
                sessionStorage.removeItem('pendingBooking');
                window.location.href = 'success.html';
            });
        });
    </script>
</body>

</html>
